    <!-- Schema.org 结构化数据 -->
    <script type="application/ld+json">

        "name": "星辰大海 My Wish",
        "url": "https://mywish.starseas.org",
        "description": "发布你的小心愿，传递正能量，获得祝福",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://mywish.starseas.org/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>

        <a href="#tab-popular" class="nav-tab active">

        </a>
        <a href="#tab-square" class="nav-tab">
